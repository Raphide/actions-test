# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - 'md-tests/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index
        run: |
          index_file="md-tests/index.md"
          echo "<h1>Index</h1>" > "$index_file"
          echo "" >> "$index_file"

          # Loop over immediate subdirectories of md-tests/, excluding 'modular'
          for dir in md-tests/*/; do
            dir_name=$(basename "$dir")

            # Skip the modular directory
            if [ "$dir_name" = "modular" ]; then
              continue
            fi

            # Find .md files only at the immediate level of this directory (no subdirectories)
            while IFS= read -r file; do
              filename=$(basename "$file" .md)
              rel_path="./${dir_name}/${filename}.md"
              echo "- [${filename}](${rel_path})" >> "$index_file"
            done < <(find "$dir" -maxdepth 1 -name "*.md" | sort)
          done

      - name: Resolve includes
        run: |
          for file in md-tests/folder1/*.md md-tests/folder2/*.md; do
            while grep -q '{{include:' "$file"; do
              include_path=$(grep -o '{{include: [^}]*}}' "$file" | head -1 | sed 's/{{include: //;s/}}//')
              full_path="md-tests/$include_path"
              included=$(cat "$full_path")
              awk -v tag="{{include: $include_path}}" -v content="$included" \
                '{gsub(tag, content)} 1' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
            done
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: md-tests/
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
